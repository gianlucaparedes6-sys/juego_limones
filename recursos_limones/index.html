<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Caza de limones</title>
  <link rel="stylesheet" href="limones_css.css">
</head>

<body onload="iniciar()">
  <div class="contenedor">

    <header class="header">
      <h1>Atrapar Limones 🍋</h1>
      <p class="subtitulo">Si del cielo te caen limones... ¡atrápalos!</p>
    </header>

    <section class="panel">
      <div class="info">
        <p>Puntaje</p>
        <span id="txtPuntaje">0</span>
      </div>

      <div class="info">
        <p>Vidas</p>
        <span id="txtVidas">3</span>
      </div>
    </section>

    <canvas id="areaJuego" width="400" height="400"></canvas>

    <div class="botones">
      <button onclick="moverDerecha()">⬅ Izquierda</button>
      <button onclick="moverIzquierda()">Derecha ➡</button>
      <button class="btn-restart" onclick="reiniciar()">🔄 Reiniciar</button>
    </div>

    <footer class="footer">
      <h2>Autor: Gianluca Paredes</h2>
    </footer>

  </div>

  <script src="limones.js"></script>
  <script src="utils.js"></script>
</body>
</html>
